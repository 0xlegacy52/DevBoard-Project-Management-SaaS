openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: DevBoard Project Management API

servers:
  - url: /api

paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/auth/register:
    post:
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/login:
    post:
      operationId: login
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/logout:
    post:
      operationId: logout
      summary: Logout
      responses:
        "204":
          description: Logged out

  /v1/auth/me:
    get:
      operationId: getMe
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/workspaces:
    get:
      operationId: listWorkspaces
      summary: List my workspaces
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceResponse"
    post:
      operationId: createWorkspace
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceBody"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/workspaces/{workspaceId}:
    get:
      operationId: getWorkspace
      summary: Get workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateWorkspace
      summary: Update workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceBody"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
    delete:
      operationId: deleteWorkspace
      summary: Delete workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "204":
          description: Deleted

  /v1/workspaces/{workspaceId}/members:
    get:
      operationId: listWorkspaceMembers
      summary: List workspace members
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMemberResponse"
    post:
      operationId: inviteWorkspaceMember
      summary: Invite member to workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberBody"
      responses:
        "201":
          description: Member invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberResponse"

  /v1/workspaces/{workspaceId}/members/{memberId}:
    patch:
      operationId: updateWorkspaceMember
      summary: Update member role
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleBody"
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberResponse"
    delete:
      operationId: removeWorkspaceMember
      summary: Remove member from workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      responses:
        "204":
          description: Member removed

  /v1/workspaces/{workspaceId}/projects:
    get:
      operationId: listProjects
      summary: List projects in workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectResponse"
    post:
      operationId: createProject
      summary: Create project
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"

  /v1/workspaces/{workspaceId}/activity:
    get:
      operationId: getWorkspaceActivity
      summary: Recent activity in workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogResponse"

  /v1/projects/{projectId}:
    get:
      operationId: getProject
      summary: Get project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
    put:
      operationId: updateProject
      summary: Update project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
    delete:
      operationId: deleteProject
      summary: Delete project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: Deleted

  /v1/projects/{projectId}/columns:
    get:
      operationId: listColumns
      summary: List columns in project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: List of columns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ColumnResponse"
    post:
      operationId: createColumn
      summary: Create column
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateColumnBody"
      responses:
        "201":
          description: Column created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColumnResponse"

  /v1/projects/{projectId}/cards:
    get:
      operationId: listProjectCards
      summary: List all cards in project with filters
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: assigneeId
          in: query
          schema:
            type: string
            format: uuid
        - name: priority
          in: query
          schema:
            type: string
            enum: [NO_PRIORITY, LOW, MEDIUM, HIGH, URGENT]
        - name: labelId
          in: query
          schema:
            type: string
            format: uuid
        - name: columnId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Filtered cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardResponse"

  /v1/projects/{projectId}/labels:
    get:
      operationId: listLabels
      summary: List labels in project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: List of labels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabelResponse"
    post:
      operationId: createLabel
      summary: Create label
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLabelBody"
      responses:
        "201":
          description: Label created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelResponse"

  /v1/projects/{projectId}/stats:
    get:
      operationId: getProjectStats
      summary: Project statistics
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStatsResponse"

  /v1/columns/{columnId}:
    put:
      operationId: updateColumn
      summary: Update column
      parameters:
        - $ref: "#/components/parameters/ColumnId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateColumnBody"
      responses:
        "200":
          description: Column updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColumnResponse"
    delete:
      operationId: deleteColumn
      summary: Delete column
      parameters:
        - $ref: "#/components/parameters/ColumnId"
      responses:
        "204":
          description: Deleted

  /v1/columns/{columnId}/cards:
    post:
      operationId: createCard
      summary: Create card in column
      parameters:
        - $ref: "#/components/parameters/ColumnId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardBody"
      responses:
        "201":
          description: Card created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"

  /v1/columns/reorder:
    patch:
      operationId: reorderColumns
      summary: Reorder columns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderColumnsBody"
      responses:
        "200":
          description: Columns reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ColumnResponse"

  /v1/cards/{cardId}:
    get:
      operationId: getCard
      summary: Get card detail
      parameters:
        - $ref: "#/components/parameters/CardId"
      responses:
        "200":
          description: Card details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardDetailResponse"
    put:
      operationId: updateCard
      summary: Update card
      parameters:
        - $ref: "#/components/parameters/CardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardBody"
      responses:
        "200":
          description: Card updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"
    delete:
      operationId: deleteCard
      summary: Delete card
      parameters:
        - $ref: "#/components/parameters/CardId"
      responses:
        "204":
          description: Deleted

  /v1/cards/{cardId}/move:
    patch:
      operationId: moveCard
      summary: Move card to another column
      parameters:
        - $ref: "#/components/parameters/CardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveCardBody"
      responses:
        "200":
          description: Card moved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"

  /v1/cards/{cardId}/assignees:
    post:
      operationId: addCardAssignee
      summary: Add assignee to card
      parameters:
        - $ref: "#/components/parameters/CardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardAssigneeBody"
      responses:
        "201":
          description: Assignee added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardAssigneeResponse"

  /v1/cards/{cardId}/assignees/{userId}:
    delete:
      operationId: removeCardAssignee
      summary: Remove assignee from card
      parameters:
        - $ref: "#/components/parameters/CardId"
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Assignee removed

  /v1/cards/{cardId}/labels:
    post:
      operationId: addCardLabel
      summary: Add label to card
      parameters:
        - $ref: "#/components/parameters/CardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardLabelBody"
      responses:
        "201":
          description: Label added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardLabelResponse"

  /v1/cards/{cardId}/labels/{labelId}:
    delete:
      operationId: removeCardLabel
      summary: Remove label from card
      parameters:
        - $ref: "#/components/parameters/CardId"
        - name: labelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Label removed

  /v1/cards/{cardId}/checklists:
    get:
      operationId: listChecklists
      summary: List checklists on card
      parameters:
        - $ref: "#/components/parameters/CardId"
      responses:
        "200":
          description: Checklists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChecklistResponse"
    post:
      operationId: createChecklist
      summary: Create checklist
      parameters:
        - $ref: "#/components/parameters/CardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChecklistBody"
      responses:
        "201":
          description: Checklist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistResponse"

  /v1/checklists/{checklistId}:
    put:
      operationId: updateChecklist
      summary: Update checklist
      parameters:
        - name: checklistId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChecklistBody"
      responses:
        "200":
          description: Checklist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistResponse"
    delete:
      operationId: deleteChecklist
      summary: Delete checklist
      parameters:
        - name: checklistId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /v1/checklists/{checklistId}/items:
    post:
      operationId: createChecklistItem
      summary: Add item to checklist
      parameters:
        - name: checklistId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChecklistItemBody"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistItemResponse"

  /v1/checklist-items/{itemId}:
    patch:
      operationId: updateChecklistItem
      summary: Update checklist item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChecklistItemBody"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistItemResponse"
    delete:
      operationId: deleteChecklistItem
      summary: Delete checklist item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /v1/cards/{cardId}/comments:
    get:
      operationId: listComments
      summary: List comments on card
      parameters:
        - $ref: "#/components/parameters/CardId"
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentResponse"
    post:
      operationId: createComment
      summary: Add comment to card
      parameters:
        - $ref: "#/components/parameters/CardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"

  /v1/comments/{commentId}:
    put:
      operationId: updateComment
      summary: Update comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentBody"
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
    delete:
      operationId: deleteComment
      summary: Delete comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /v1/cards/{cardId}/attachments:
    get:
      operationId: listAttachments
      summary: List attachments on card
      parameters:
        - $ref: "#/components/parameters/CardId"
      responses:
        "200":
          description: Attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttachmentResponse"
    post:
      operationId: createAttachment
      summary: Add attachment to card
      parameters:
        - $ref: "#/components/parameters/CardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttachmentBody"
      responses:
        "201":
          description: Attachment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResponse"

  /v1/attachments/{attachmentId}:
    delete:
      operationId: deleteAttachment
      summary: Delete attachment
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /v1/notifications:
    get:
      operationId: listNotifications
      summary: List notifications
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationResponse"
    patch:
      operationId: markNotificationsRead
      summary: Mark notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkNotificationsReadBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/dashboard/summary:
    get:
      operationId: getDashboardSummary
      summary: Dashboard summary for current user
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"

  /v1/labels/{labelId}:
    put:
      operationId: updateLabel
      summary: Update label
      parameters:
        - name: labelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLabelBody"
      responses:
        "200":
          description: Label updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelResponse"
    delete:
      operationId: deleteLabel
      summary: Delete label
      parameters:
        - name: labelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

components:
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ColumnId:
      name: columnId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CardId:
      name: cardId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    RegisterBody:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          minLength: 8

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, accessToken]
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        accessToken:
          type: string

    UserResponse:
      type: object
      required: [id, email, name, emailVerified, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateWorkspaceBody:
      type: object
